version: "3"

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: sql_server_container

    environment:
      SA_PASSWORD: "YourPassword123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
  