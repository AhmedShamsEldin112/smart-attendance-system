services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db

    environment:
      SA_PASSWORD: "yourPassword123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

  backend:
    build: .
    container_name: backend

    ports:
      - "5000:5000"

    depends_on:
      - db

    env_file:
      - ./.env